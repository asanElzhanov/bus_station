{% extends "base.html" %}
{% block title %}Вход — АвтоВокзал{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-7 col-lg-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                     style="width:72px;height:72px;background:linear-gradient(135deg,var(--primary-dark),var(--primary));">
                    <i class="bi bi-person-circle text-white fs-1"></i>
                </div>
                <h2 class="fw-800 fw-montserrat">Добро пожаловать</h2>
                <p class="text-muted">Войдите в систему</p>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-600">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-envelope text-primary"></i></span>
                                <input type="email" name="email" class="form-control border-start-0 ps-0"
                                       placeholder="you@example.com" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-600">Пароль</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-lock text-primary"></i></span>
                                <input type="password" name="password" class="form-control border-start-0 ps-0"
                                       placeholder="••••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg fw-600 mb-3">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Войти
                        </button>
                        <p class="text-center text-muted mb-0">
                            Нет аккаунта?
                            <a href="{% url 'users:register' %}" class="text-primary fw-600">Зарегистрироваться</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
